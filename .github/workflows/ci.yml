name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  python-checks:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Syntax check
        run: |
          python -m py_compile .\Nishizumi_Paintsv6_nobrowser.py
          python -m py_compile .\nishizumi_paints_random_showroom.py
